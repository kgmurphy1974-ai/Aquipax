<!DOCTYPE html>
<html>
<head><title>Widget Data</title></head>
<body>
<script>
// This page reads localStorage and outputs widget data as JSON
// The service worker intercepts /widget-data requests
const state = JSON.parse(localStorage.getItem('aq3') || '{}');

function calcSafe(d) {
  if (!d || !d.income) return { amount: '—', savings: '—', nextBill: '—' };
  const mU = m => { let dd = m - new Date().getMonth(); if(dd<=0) dd+=12; return dd; };
  const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const tBills = (d.bills||[]).reduce((s,b)=>s+Number(b.amount||0),0);
  const tAnnual = (d.annual||[]).reduce((s,a)=>s+Number(a.amount||0),0);
  const vAnnual = ((d.renewals||{}).vehicle||[]).reduce((s,v)=>s+Number(v.cost||0),0);
  const hMonthly = ((d.renewals||{}).home||[]).filter(h=>h.monthly).reduce((s,h)=>s+Number(h.monthly||0),0);
  const hAnnual = ((d.renewals||{}).home||[]).filter(h=>h.cost&&!h.monthly).reduce((s,h)=>s+Number(h.cost||0),0);
  const buffer = Math.round((tAnnual+vAnnual+hAnnual)/12);
  const hSave = (d.holidays||[]).reduce((s,h)=>{const ml=Math.max(1,mU(h.month));return s+Math.round(Number(h.budget||0)/ml);},0);
  const surplus = Number(d.income||0) - tBills - hMonthly - buffer - hSave;
  let savingsAmt = 0;
  const sv = d.savings || {};
  if(sv.mode==='pct') savingsAmt = Math.round(surplus*(Number(sv.pct||0)/100));
  else if(sv.mode==='fixed') savingsAmt = Number(sv.fixed||0);
  else if(sv.mode==='goal') savingsAmt = Math.round(Number(sv.goalAmt||0)/Math.max(1,mU(sv.goalMonth||11)));
  savingsAmt = Math.max(0, Math.min(savingsAmt, surplus));
  const safe = Math.max(0, surplus - savingsAmt);
  
  // Next upcoming renewal
  const allR = [...((d.renewals||{}).vehicle||[]),...((d.renewals||{}).home||[])];
  const next = allR.sort((a,b)=>mU(a.dueMonth||0)-mU(b.dueMonth||0))[0];
  const nextBill = next ? `${next.label} (${MONTHS[next.dueMonth||0]})` : 'None due';
  
  return {
    amount: '£' + safe.toLocaleString(),
    savings: '£' + savingsAmt.toLocaleString() + '/mo',
    nextBill
  };
}

const widgetData = calcSafe(state);
document.write(JSON.stringify(widgetData));
</script>
</body>
</html>
