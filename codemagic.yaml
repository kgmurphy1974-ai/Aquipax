workflows:
  ios-release:
    name: Aquipax iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: JeanieIQ
    environment:
      node: v18.17.0
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps
      - name: Install Capacitor iOS
        script: npm install --legacy-peer-deps @capacitor/ios
      - name: Add iOS platform
        script: npx cap add ios || true
      - name: Fix Podfile deployment target
        script: |
          PODFILE="ios/App/Podfile"
          echo "Before fix:"
          cat "$PODFILE"
          python3 -c "
          import re, sys
          content = open('$PODFILE').read()
          content = re.sub(r\"platform :ios, '[0-9.]+'\", \"platform :ios, '14.0'\", content)
          open('$PODFILE', 'w').write(content)
          print('Done')
          "
          echo "After fix:"
          cat "$PODFILE"
      - name: Install CocoaPods
        script: cd ios/App && pod install
      - name: Copy web assets
        script: npx cap copy ios
      - name: Build iOS IPA (unsigned)
        script: |
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "App" \
            --skip-package-ipa
    artifacts:
      - ios/App/build/Build/Products/Release-iphoneos/*.app
      - /tmp/xcodebuild_logs/*.log
