workflows:
  ios-release:
    name: Aquipax iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: JeanieIQ
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.jeanieiq.aquipax
      node: v18.17.0
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps
      - name: Install Capacitor iOS
        script: npm install @capacitor/ios@6 --legacy-peer-deps
      - name: Add iOS platform
        script: npx cap add ios 2>&1 || true
      - name: Fix deployment targets and replace icon
        script: |
          python3 << 'PYEOF'
          import re, glob, shutil, os

          f = 'ios/App/Podfile'
          content = open(f).read()
          content = re.sub(r"platform :ios, '[0-9.]+'", "platform :ios, '14.0'", content)
          content = content.replace(
              'assertDeploymentTarget(installer)',
              """installer.pods_project.targets.each do |target|
            target.build_configurations.each do |config|
              config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '14.0'
            end
          end"""
          )
          open(f, 'w').write(content)

          for pbx in glob.glob('ios/**/*.pbxproj', recursive=True):
              content = open(pbx).read()
              content = re.sub(r'IPHONEOS_DEPLOYMENT_TARGET = [0-9.]+', 'IPHONEOS_DEPLOYMENT_TARGET = 14.0', content)
              open(pbx, 'w').write(content)

          icon_src = 'assets/icon.png'
          iconset = 'ios/App/App/Assets.xcassets/AppIcon.appiconset'
          if os.path.exists(iconset) and os.path.exists(icon_src):
              for f in glob.glob(f'{iconset}/*.png'):
                  os.remove(f)
              shutil.copy(icon_src, f'{iconset}/Icon-1024.png')
              print('Icon replaced successfully')
          else:
              print(f'Iconset path: {iconset} exists: {os.path.exists(iconset)}')
          PYEOF
      - name: Install CocoaPods
        script: cd ios/App && pod install
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Copy web assets
        script: npx cap copy ios
      - name: Build iOS IPA
        script: |
          cd ios/App
          agvtool new-version -all 2
          cd ../..
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "App"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
