    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps
      - name: Add iOS platform
        script: |
          npm install --legacy-peer-deps @capacitor/ios
          npx cap add ios || true
          npx cap sync ios --deployment-target 14.0
      - name: Set iOS deployment target
        script: |
          cd ios/App
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 14.0/g' App.xcodeproj/project.pbxproj
      - name: Install CocoaPods
        script: cd ios/App && pod install
      - name: Build iOS IPA (unsigned)
        script: |
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "App" \
            --skip-package-ipa
