workflows:
  ios-release:
    name: Aquipax iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: JeanieIQ
    environment:
      node: v18.17.0
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps
      - name: Install Capacitor iOS
        script: npm install @capacitor/ios@6 --legacy-peer-deps
      - name: Add iOS platform
        script: npx cap add ios 2>&1 || true
      - name: Fix all deployment targets
        script: |
          python3 << 'PYEOF'
          import re, glob

          f = 'ios/App/Podfile'
          content = open(f).read()
          content = re.sub(r"platform :ios, '[0-9.]+'", "platform :ios, '14.0'", content)
          content = content.replace(
              'assertDeploymentTarget(installer)',
              """installer.pods_project.targets.each do |target|
            target.build_configurations.each do |config|
              config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '14.0'
            end
          end"""
          )
          open(f, 'w').write(content)
          print('Podfile fixed')

          for pbx in glob.glob('ios/**/*.pbxproj', recursive=True):
              content = open(pbx).read()
              content = re.sub(r'IPHONEOS_DEPLOYMENT_TARGET = [0-9.]+', 'IPHONEOS_DEPLOYMENT_TARGET = 14.0', content)
              open(pbx, 'w').write(content)
              print(f'Fixed: {pbx}')
          PYEOF
      - name: Install CocoaPods
        script: cd ios/App && pod install
      - name: Copy web assets
        script: npx cap copy ios
      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "App"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
