workflows:
  ios-release:
    name: Aquipax iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: JeanieIQ
    environment:
      node: v18.17.0
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps
      - name: Install Capacitor iOS
        script: npm install --legacy-peer-deps @capacitor/ios
      - name: Add iOS platform
        script: npx cap add ios || true
      - name: Overwrite Podfile with correct deployment target
        script: |
          cat > ios/App/Podfile << 'EOF'
          platform :ios, '14.0'
          use_frameworks!

          target 'App' do
            capacitor_pods
          end
          EOF
      - name: Install CocoaPods
        script: cd ios/App && pod install
      - name: Copy web assets
        script: npx cap copy ios
      - name: Build iOS IPA (unsigned)
        script: |
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "App" \
            --skip-package-ipa
    artifacts:
      - ios/App/build/Build/Products/Release-iphoneos/*.app
      - /tmp/xcodebuild_logs/*.log
