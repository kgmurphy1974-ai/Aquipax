workflows:
  ios-release:
    name: Aquipax iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: JeanieIQ
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.jeanieiq.aquipax
      node: v18.17.0
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps
      - name: Install Capacitor iOS
        script: npm install @capacitor/ios@6 --legacy-peer-deps
      - name: Add iOS platform
        script: npx cap add ios 2>&1 || true
      - name: Fix deployment targets and generate icons
        script: |
          pip3 install pillow --quiet
          python3 << 'PYEOF'
          import re, glob, os, json
          from PIL import Image

          f = 'ios/App/Podfile'
          content = open(f).read()
          content = re.sub(r"platform :ios, '[0-9.]+'", "platform :ios, '14.0'", content)
          content = content.replace(
              'assertDeploymentTarget(installer)',
              """installer.pods_project.targets.each do |target|
            target.build_configurations.each do |config|
              config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '14.0'
            end
          end"""
          )
          open(f, 'w').write(content)

          for pbx in glob.glob('ios/**/*.pbxproj', recursive=True):
              content = open(pbx).read()
              content = re.sub(r'IPHONEOS_DEPLOYMENT_TARGET = [0-9.]+', 'IPHONEOS_DEPLOYMENT_TARGET = 14.0', content)
              open(pbx, 'w').write(content)

          icon_src = 'assets/icon.png'
          iconset = 'ios/App/App/Assets.xcassets/AppIcon.appiconset'

          if os.path.exists(icon_src) and os.path.exists(iconset):
              src = Image.open(icon_src).convert('RGBA')
              sizes = [
                  ('Icon-20@1x.png', 20), ('Icon-20@2x.png', 40), ('Icon-20@3x.png', 60),
                  ('Icon-29@1x.png', 29), ('Icon-29@2x.png', 58), ('Icon-29@3x.png', 87),
                  ('Icon-40@1x.png', 40), ('Icon-40@2x.png', 80), ('Icon-40@3x.png', 120),
                  ('Icon-60@2x.png', 120), ('Icon-60@3x.png', 180),
                  ('Icon-76@1x.png', 76), ('Icon-76@2x.png', 152),
                  ('Icon-83.5@2x.png', 167), ('Icon-1024.png', 1024),
              ]
              for fname, size in sizes:
                  img = src.resize((size, size), Image.LANCZOS)
                  rgb = Image.new('RGB', img.size, (255, 255, 255))
                  rgb.paste(img, mask=img.split()[3])
                  rgb.save(os.path.join(iconset, fname), 'PNG')
              contents = {
                "images": [
                  {"size":"20x20","idiom":"iphone","filename":"Icon-20@2x.png","scale":"2x"},
                  {"size":"20x20","idiom":"iphone","filename":"Icon-20@3x.png","scale":"3x"},
                  {"size":"29x29","idiom":"iphone","filename":"Icon-29@1x.png","scale":"1x"},
                  {"size":"29x29","idiom":"iphone","filename":"Icon-29@2x.png","scale":"2x"},
                  {"size":"29x29","idiom":"iphone","filename":"Icon-29@3x.png","scale":"3x"},
                  {"size":"40x40","idiom":"iphone","filename":"Icon-40@2x.png","scale":"2x"},
                  {"size":"40x40","idiom":"iphone","filename":"Icon-40@3x.png","scale":"3x"},
                  {"size":"60x60","idiom":"iphone","filename":"Icon-60@2x.png","scale":"2x"},
                  {"size":"60x60","idiom":"iphone","filename":"Icon-60@3x.png","scale":"3x"},
                  {"size":"20x20","idiom":"ipad","filename":"Icon-20@1x.png","scale":"1x"},
                  {"size":"20x20","idiom":"ipad","filename":"Icon-20@2x.png","scale":"2x"},
                  {"size":"29x29","idiom":"ipad","filename":"Icon-29@1x.png","scale":"1x"},
                  {"size":"29x29","idiom":"ipad","filename":"Icon-29@2x.png","scale":"2x"},
                  {"size":"40x40","idiom":"ipad","filename":"Icon-40@1x.png","scale":"1x"},
                  {"size":"40x40","idiom":"ipad","filename":"Icon-40@2x.png","scale":"2x"},
                  {"size":"76x76","idiom":"ipad","filename":"Icon-76@1x.png","scale":"1x"},
                  {"size":"76x76","idiom":"ipad","filename":"Icon-76@2x.png","scale":"2x"},
                  {"size":"83.5x83.5","idiom":"ipad","filename":"Icon-83.5@2x.png","scale":"2x"},
                  {"size":"1024x1024","idiom":"ios-marketing","filename":"Icon-1024.png","scale":"1x"}
                ],
                "info": {"version": 1, "author": "xcode"}
              }
              json.dump(contents, open(os.path.join(iconset, 'Contents.json'), 'w'), indent=2)
              print('All icons generated successfully')
          else:
              print(f'Icon src exists: {os.path.exists(icon_src)}, Iconset exists: {os.path.exists(iconset)}')
          PYEOF
      - name: Install CocoaPods
        script: cd ios/App && pod install
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Copy web assets
        script: npx cap copy ios
      - name: Build iOS IPA
        script: |
          cd ios/App
          agvtool new-version -all 3
          cd ../..
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "App"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
