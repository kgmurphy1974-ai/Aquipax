workflows:
  ios-release:
    name: Aquipax iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: JeanieIQ
    environment:
      node: v18.17.0
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps
      - name: Install Capacitor iOS
        script: npm install --legacy-peer-deps @capacitor/ios
      - name: Add iOS platform
        script: npx cap add ios 2>&1 || true
      - name: Fix deployment targets
        script: |
          python3 << 'PYEOF'
          import re
          f = 'ios/App/Podfile'
          content = open(f).read()
          content = re.sub(r"platform :ios, '[0-9.]+'", "platform :ios, '14.0'", content)
          content = content.replace(
              'assertDeploymentTarget(installer)',
              """installer.pods_project.targets.each do |target|
            target.build_configurations.each do |config|
              config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '14.0'
            end
          end"""
          )
          open(f, 'w').write(content)
          print('Podfile fixed')
          PYEOF
          find ios/App -name "*.pbxproj" -exec sed -i.bak 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 14.0/g' {} \;
          echo "All deployment targets set to 14.0"
      - name: Install CocoaPods
        script: cd ios/App && pod install
      - name: Copy web assets
        script: npx cap copy ios
      - name: Build iOS IPA (unsigned)
        script: |
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "App" \
            --skip-package-ipa
    artifacts:
      - ios/App/build/Build/Products/Release-iphoneos/*.app
      - /tmp/xcodebuild_logs/*.log
