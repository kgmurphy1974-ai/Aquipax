workflows:
  ios-release:
    name: Aquipax iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: JeanieIQ
    environment:
      node: v18.17.0
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps
      - name: Install Capacitor iOS
        script: npm install --legacy-peer-deps @capacitor/ios
      - name: Add iOS platform
        script: npx cap add ios || true
      - name: Fix deployment targets
        script: |
          python3 -c "
          import re
          f = 'ios/App/Podfile'
          content = open(f).read()
          content = re.sub(r\"platform :ios, '[0-9.]+'\", \"platform :ios, '14.0'\", content)
          open(f, 'w').write(content)
          print('Podfile fixed')
          "
          find ios/App -name "*.pbxproj" -exec python3 -c "
          import re, sys
          f = sys.argv[1]
          content = open(f).read()
          content = re.sub(r'IPHONEOS_DEPLOYMENT_TARGET = [0-9.]+', 'IPHONEOS_DEPLOYMENT_TARGET = 14.0', content)
          open(f, 'w').write(content)
          print('pbxproj fixed:', f)
          " {} \;
      - name: Install CocoaPods
        script: cd ios/App && pod install
      - name: Copy web assets
        script: npx cap copy ios
      - name: Build iOS IPA (unsigned)
        script: |
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "App" \
            --skip-package-ipa
    artifacts:
      - ios/App/build/Build/Products/Release-iphoneos/*.app
      - /tmp/xcodebuild_logs/*.log
